testing:
  agentDefaults:
    maxAutoRepairs: 5
  resources:
    tsc:
      type: shell
      name: Typescript Check
      command: npx tsc --noEmit
      isolation: none
      timeoutSeconds: 60
      projectDirectory: ./
    vitest:
      type: shell
      name: Vitest Testing
      command: set -o pipefail && vitest run --no-color --reporter tap-flat --silent | grep -v '^ok'
      isolation: none
      projectDirectory: ./
      timeoutSeconds: 60
      cropOutput: 20000
    markdown:
      type: shell
      name: Markdown Validation
      command: markdownlint {pkg,app,frontend,docs}/**/*.md --fix 2>/dev/null 1>/dev/null ; markdownlint {pkg,app,frontend,docs}/**/*.md
      isolation: none
      projectDirectory: ./
      timeoutSeconds: 60
      cropOutput: 20000
    biome:
      type: shell
      name: Biome Formatting
      command: biome lint {pkg,app,frontend}/ --fix --unsafe 2>/dev/null 1>/dev/null ; biome lint {pkg,app,frontend}/
      isolation: none
      projectDirectory: ./