workflows:
  unitTestUpdater:
    name: "All-Package Unit Test Updater"
    description: "This agent automatically updates unit tests for each package in the TokenRing monorepo using the testEngineer agent."
    agentType: "leader"
    steps:
      - /function define js getPackageDirectories() { return (await import('fs')).globSync('pkg/*') }
      - /list @packages = getPackageDirectories()
      - |
        /for $pkg in @packages {
          /eval /agent run --neverFail --type test-engineer Scan the source code in $pkg/, run the test suite with 'bun run vitest', remove any tests that are no longer relevant, and add new tests where necessary to match the current code
        }
