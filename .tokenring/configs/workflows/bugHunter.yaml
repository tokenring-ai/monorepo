workflows:
  bugHunter:
    name: "All-Package Bug Hunter"
    description: "This agent will automatically find and fix 3 small bugs in each package in the TokenRing monorepo"
    agentType: "leader"
    steps:
      - /function define js getPackageDirectories() { return (await import('fs')).globSync('pkg/*') }
      - /list @packages = getPackageDirectories()
      - |
        /for $pkg in @packages {
          /eval /agent run --type code-quality-engineer Search for all the files in $pkg/, identify 3 small bugs in the package code, and fix each one
        }
