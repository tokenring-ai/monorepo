workflows:
  chatFrontendSpacingImprover:
    name: "Chat Frontend Spacing Improver"
    description: "Reviews and improves component spacing (padding, margin, gaps) for consistency with parent components in the chat frontend"
    agentType: "leader"
    steps:
      - /function define js getChatTsxFiles() { return (await import('fs')).globSync('frontend/chat/src/**/*.tsx') }
      - /list @files = getChatTsxFiles()
      - |
        /for $file in @files {
          /eval /agent run --type ui-ux-designer Review the spacing in $file — padding, margin, gap, and layout spacing utilities. Check that spacing is consistent with the design system's spacing scale, avoids arbitrary values, and feels balanced relative to the component's parent and children. Fix any spacing that looks cramped, excessive, or inconsistent.
        }
