workflows:
  chatFrontendVisualConsistencyImprover:
    name: "Chat Frontend Visual Consistency Improver"
    description: "Identifies and fixes visual inconsistencies in chat frontend components, including between parent and child components"
    agentType: "leader"
    steps:
      - /function define js getChatTsxFiles() { return (await import('fs')).globSync('frontend/chat/src/**/*.tsx') }
      - /list @files = getChatTsxFiles()
      - |
        /for $file in @files {
          /eval /agent run --type ui-ux-designer Review $file for visual inconsistencies such as mismatched typography, inconsistent border styles, misaligned elements, or conflicting visual patterns. Also check how it visually relates to its parent and child components — look for inconsistencies in sizing, borders, shadows, and overall visual language. Implement fixes for any issues found.
        }
