name: Publish to NPM

on:
  push:

permissions:
  id-token: write  # Required for OIDC
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build naudiodon3
        run: bun run install
        working-directory: ./deps/naudiodon3

      - name: Build One binary
        run: bun build --compile ./tokenring.ts --outfile tokenring-macos-arm64
        working-directory: ./app/one

      - name: Copy portaudio lib to One directory
        run: |
          cp ./deps/naudiodon3/portaudio/bin/libportaudio.dylib ./app/one
          cd app/one
          install_name_tool -add_rpath "@loader_path" tokenring-macos-arm64
          ./tokenring-macos-arm64 -h

      - name: Upload One binary
        uses: actions/upload-artifact@v4
        with:
          name: tokenring-macos-arm64
          path: ./app/one/tokenring-macos-arm64

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build naudiodon3
        run: bun run install
        working-directory: ./deps/naudiodon3

      - name: Build chat frontend
        run: bun run build
        working-directory: ./frontend/chat

      - name: Upload chat frontend
        uses: actions/upload-artifact@v4
        with:
          name: chat-frontend
          path: ./frontend/chat/dist

      - name: Build One binary
        run: bun build --compile --target=bun-linux-x64 ./tokenring.ts --outfile tokenring-linux-x64
        working-directory: ./app/one

      - name: Check that One can start
        run: ./tokenring-linux-x64 -h
        working-directory: ./app/one

      - name: Build One arm64 binary
        run: bun build --compile --target=bun-linux-arm64 ./tokenring.ts --outfile tokenring-linux-arm64
        working-directory: ./app/one

      - name: Upload One binary
        uses: actions/upload-artifact@v4
        with:
          name: tokenring-linux-x64
          path: ./app/one/tokenring-linux-x64

      - name: Upload One arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: tokenring-linux-arm64
          path: ./app/one/tokenring-linux-arm64

  publish-one-npm:
    runs-on: ubuntu-latest
    needs: [build-macos-arm64, build-linux-x64]
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download chat frontend
        uses: actions/download-artifact@v4
        with:
          name: chat-frontend
          path: ./artifacts/chat-frontend

      - name: Download One binaries
        uses: actions/download-artifact@v4
        with:
          pattern: tokenring-*
          path: ./artifacts
          merge-multiple: true

      - name: Prepare One platform package
        run: |
          mkdir -p \
            app/one/packages/npm/one/bin/darwin-arm64 \
            app/one/packages/npm/one/bin/linux-x64 \
            app/one/packages/npm/one/bin/linux-arm64
          cp artifacts/tokenring-macos-arm64 app/one/packages/npm/one/bin/darwin-arm64/tokenring
          cp deps/naudiodon3/portaudio/bin/libportaudio.dylib app/one/packages/npm/one/bin/darwin-arm64/
          cp artifacts/tokenring-linux-x64 app/one/packages/npm/one/bin/linux-x64/tokenring
          cp deps/naudiodon3/portaudio/bin/libportaudio.so.2 app/one/packages/npm/one/bin/linux-x64/
          cp artifacts/tokenring-linux-arm64 app/one/packages/npm/one/bin/linux-arm64/tokenring
          cp deps/naudiodon3/portaudio/bin_armhf/libportaudio.so.2 app/one/packages/npm/one/bin/linux-arm64/
          chmod +x app/one/packages/npm/one/bin/*/tokenring
          mkdir -p app/one/packages/npm/one/frontend/chat
          cp -r artifacts/chat-frontend/* app/one/packages/npm/one/frontend/chat

      - name: Publish One to NPM
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public --tag next
        working-directory: ./app/one/packages/npm/one
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify-npm-publish:
    needs: [publish-one-npm]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-x64
          - os: ubuntu-24.04-arm
            arch: linux-arm64
          - os: macos-latest
            arch: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for npm registry propagation
        run: sleep 30

      - name: Test One package
        run: npx @tokenring-ai/one@${{ steps.version.outputs.version }} -h

  publish-docker:
    runs-on: ubuntu-latest
    needs: [publish-one-npm]
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download chat frontend
        uses: actions/download-artifact@v4
        with:
          name: chat-frontend
          path: ./artifacts/chat-frontend

      - name: Download One binaries
        uses: actions/download-artifact@v4
        with:
          pattern: tokenring-linux-*
          path: ./artifacts
          merge-multiple: true

      - name: Prepare Docker build
        run: |
          mkdir -p app/one/dist/frontend
          cp artifacts/tokenring-linux-x64 app/one/dist/tokenring-linux-amd64
          cp artifacts/tokenring-linux-arm64 app/one/dist/tokenring-linux-arm64
          cp -r artifacts/chat-frontend app/one/dist/frontend/chat
          chmod +x app/one/dist/tokenring-linux-*

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for One
        id: meta-one
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/tokenring-ai/one
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push One Docker image
#        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: ./app/one
          file: ./app/one/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-one.outputs.tags }}
          labels: ${{ steps.meta-one.outputs.labels }}
          cache-from: type=gha,scope=one
          cache-to: type=gha,mode=max,scope=one
