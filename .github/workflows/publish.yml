name: Publish TokenRing

on:
  push:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ghcr.io
  BUN_VERSION: 1.3.14

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            bun_target: bun-darwin-arm64
            one_artifact: tokenring-one-macos-arm64
            one_binary: tokenring-one-macos-arm64
            cli_artifact: tokenring-cli-macos-arm64
            cli_binary: tokenring-cli-macos-arm64
            build_frontend: false
          - os: macos-15-intel
            platform: darwin-x64
            bun_target: bun-darwin-x64
            one_artifact: tokenring-one-macos-x64
            one_binary: tokenring-one-macos-x64
            cli_artifact: tokenring-cli-macos-x64
            cli_binary: tokenring-cli-macos-x64
            build_frontend: false
          - os: ubuntu-latest
            platform: linux-x64
            bun_target: bun-linux-x64
            one_artifact: tokenring-one-linux-x64
            one_binary: tokenring-one-linux-x64
            cli_artifact: tokenring-cli-linux-x64
            cli_binary: tokenring-cli-linux-x64
            build_frontend: true
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            bun_target: bun-linux-arm64
            one_artifact: tokenring-one-linux-arm64
            one_binary: tokenring-one-linux-arm64
            cli_artifact: tokenring-cli-linux-arm64
            cli_binary: tokenring-cli-linux-arm64
            build_frontend: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Build TokenRing One web frontend
        if: matrix.build_frontend
        run: bun run build
        working-directory: ./frontend/one

      - name: Upload TokenRing One web frontend
        if: matrix.build_frontend
        uses: actions/upload-artifact@v7
        with:
          name: one-frontend
          path: ./frontend/one/dist

      - name: Build TokenRing One
        run: bun build --compile --target=${{ matrix.bun_target }} ./tokenring.ts --outfile ${{ matrix.one_binary }}
        working-directory: ./app/one

      - name: Check that TokenRing One can start
        run: ./${{ matrix.one_binary }} -h
        working-directory: ./app/one

      - name: Build TokenRing CLI
        run: |
          cargo build --release --locked --manifest-path crates/cli-rs/Cargo.toml
          cp crates/cli-rs/target/release/tokenring "${{ matrix.cli_binary }}"

      - name: Check that TokenRing CLI can start
        run: ./${{ matrix.cli_binary }} -h

      - name: Upload TokenRing One binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.one_artifact }}
          path: ./app/one/${{ matrix.one_binary }}

      - name: Upload TokenRing CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cli_artifact }}
          path: ./${{ matrix.cli_binary }}

  publish-one-npm:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download TokenRing One web frontend
        uses: actions/download-artifact@v7
        with:
          name: one-frontend
          path: ./artifacts/one-frontend

      - name: Download TokenRing One Linux binaries
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-one-linux-*
          path: ./artifacts
          merge-multiple: true

      - name: Download TokenRing One macOS binaries
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-one-macos-*
          path: ./artifacts
          merge-multiple: true

      - name: Prepare TokenRing One npm package
        run: |
          mkdir -p \
            packaging/npm/one/bin/darwin-arm64 \
            packaging/npm/one/bin/darwin-x64 \
            packaging/npm/one/bin/linux-x64 \
            packaging/npm/one/bin/linux-arm64
          cp artifacts/tokenring-one-macos-arm64 packaging/npm/one/bin/darwin-arm64/tokenring-one
          cp artifacts/tokenring-one-macos-x64 packaging/npm/one/bin/darwin-x64/tokenring-one
          cp artifacts/tokenring-one-linux-x64 packaging/npm/one/bin/linux-x64/tokenring-one
          cp artifacts/tokenring-one-linux-arm64 packaging/npm/one/bin/linux-arm64/tokenring-one
          chmod +x packaging/npm/one/bin/*/tokenring-one
          mkdir -p packaging/npm/one/frontend/one
          cp -r artifacts/one-frontend/* packaging/npm/one/frontend/one

      - name: Publish @tokenring/one
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public --tag next
        working-directory: ./packaging/npm/one
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli-npm:
    runs-on: ubuntu-latest
    needs: [build, publish-one-npm]
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download TokenRing CLI Linux binaries
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-cli-linux-*
          path: ./artifacts
          merge-multiple: true

      - name: Download TokenRing CLI macOS binaries
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-cli-macos-*
          path: ./artifacts
          merge-multiple: true

      - name: Prepare TokenRing CLI npm package
        run: |
          mkdir -p \
            packaging/npm/cli/bin/darwin-arm64 \
            packaging/npm/cli/bin/darwin-x64 \
            packaging/npm/cli/bin/linux-x64 \
            packaging/npm/cli/bin/linux-arm64
          cp artifacts/tokenring-cli-macos-arm64 packaging/npm/cli/bin/darwin-arm64/tokenring
          cp artifacts/tokenring-cli-macos-x64 packaging/npm/cli/bin/darwin-x64/tokenring
          cp artifacts/tokenring-cli-linux-x64 packaging/npm/cli/bin/linux-x64/tokenring
          cp artifacts/tokenring-cli-linux-arm64 packaging/npm/cli/bin/linux-arm64/tokenring
          chmod +x packaging/npm/cli/bin/*/tokenring

      - name: Publish @tokenring/cli
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public --tag next
        working-directory: ./packaging/npm/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  package-deb:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            one_binary: tokenring-one-linux-x64
            cli_binary: tokenring-cli-linux-x64
          - arch: arm64
            one_binary: tokenring-one-linux-arm64
            cli_binary: tokenring-cli-linux-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve package version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(jq -r .version packaging/npm/one/package.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download TokenRing One binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.one_binary }}
          path: ./artifacts

      - name: Download TokenRing CLI binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.cli_binary }}
          path: ./artifacts

      - name: Download TokenRing One web frontend
        uses: actions/download-artifact@v7
        with:
          name: one-frontend
          path: ./artifacts/one-frontend

      - name: Build TokenRing One .deb
        run: |
          ./packaging/deb/one/build-deb.sh \
            --version "${{ steps.version.outputs.version }}" \
            --arch "${{ matrix.arch }}" \
            --binary "./artifacts/${{ matrix.one_binary }}" \
            --frontend "./artifacts/one-frontend" \
            --outdir ./artifacts/deb

      - name: Build TokenRing CLI .deb
        run: |
          ./packaging/deb/cli/build-deb.sh \
            --version "${{ steps.version.outputs.version }}" \
            --arch "${{ matrix.arch }}" \
            --binary "./artifacts/${{ matrix.cli_binary }}" \
            --outdir ./artifacts/deb

      - name: Upload .deb packages
        uses: actions/upload-artifact@v7
        with:
          name: tokenring-deb-${{ matrix.arch }}
          path: ./artifacts/deb/*.deb

  package-rpm:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            one_binary: tokenring-one-linux-x64
            cli_binary: tokenring-cli-linux-x64
            runner: ubuntu-latest
          - arch: aarch64
            one_binary: tokenring-one-linux-arm64
            cli_binary: tokenring-cli-linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Resolve package version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(jq -r .version packaging/npm/one/package.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download TokenRing One binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.one_binary }}
          path: ./artifacts

      - name: Download TokenRing CLI binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.cli_binary }}
          path: ./artifacts

      - name: Download TokenRing One web frontend
        uses: actions/download-artifact@v7
        with:
          name: one-frontend
          path: ./artifacts/one-frontend

      - name: Build TokenRing One .rpm
        run: |
          ./packaging/rpm/one/build-rpm.sh \
            --version "${{ steps.version.outputs.version }}" \
            --arch "${{ matrix.arch }}" \
            --binary "./artifacts/${{ matrix.one_binary }}" \
            --frontend "./artifacts/one-frontend" \
            --outdir ./artifacts/rpm

      - name: Build TokenRing CLI .rpm
        run: |
          ./packaging/rpm/cli/build-rpm.sh \
            --version "${{ steps.version.outputs.version }}" \
            --arch "${{ matrix.arch }}" \
            --binary "./artifacts/${{ matrix.cli_binary }}" \
            --outdir ./artifacts/rpm

      - name: Upload .rpm packages
        uses: actions/upload-artifact@v7
        with:
          name: tokenring-rpm-${{ matrix.arch }}
          path: ./artifacts/rpm/*.rpm

  create-release:
    runs-on: ubuntu-latest
    needs: [publish-cli-npm, package-deb, package-rpm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download TokenRing One binaries
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-one-*
          path: ./artifacts
          merge-multiple: true

      - name: Download TokenRing CLI binaries
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-cli-*
          path: ./artifacts
          merge-multiple: true

      - name: Download deb packages
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-deb-*
          path: ./artifacts
          merge-multiple: true

      - name: Download rpm packages
        uses: actions/download-artifact@v7
        with:
          pattern: tokenring-rpm-*
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/tokenring-one-macos-arm64
            artifacts/tokenring-one-macos-x64
            artifacts/tokenring-one-linux-x64
            artifacts/tokenring-one-linux-arm64
            artifacts/tokenring-cli-macos-arm64
            artifacts/tokenring-cli-macos-x64
            artifacts/tokenring-cli-linux-x64
            artifacts/tokenring-cli-linux-arm64
            artifacts/tokenring-one_*_amd64.deb
            artifacts/tokenring-one_*_arm64.deb
            artifacts/tokenring-cli_*_amd64.deb
            artifacts/tokenring-cli_*_arm64.deb
            artifacts/tokenring-one_*_x86_64.rpm
            artifacts/tokenring-one_*_aarch64.rpm
            artifacts/tokenring-cli_*_x86_64.rpm
            artifacts/tokenring-cli_*_aarch64.rpm

  verify-npm-publish:
    needs: [publish-cli-npm]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Wait for npm registry propagation
        run: sleep 30

      - name: Test @tokenring/one
        run: npx @tokenring/one@${{ steps.version.outputs.version }} -h

      - name: Test @tokenring/cli
        run: npx @tokenring/cli@${{ steps.version.outputs.version }} -h

  publish-docker:
    needs: [build]
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            docker_arch: amd64
            binary: tokenring-one-linux-x64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            docker_arch: arm64
            binary: tokenring-one-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Download TokenRing One web frontend
        uses: actions/download-artifact@v7
        with:
          name: one-frontend
          path: ./artifacts/one-frontend

      - name: Download TokenRing One binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ./artifacts

      - name: Prepare Docker build context
        run: |
          mkdir -p packaging/docker/one/dist/frontend
          cp "artifacts/${{ matrix.binary }}" "packaging/docker/one/dist/tokenring-one-linux-${{ matrix.docker_arch }}"
          cp -r artifacts/one-frontend packaging/docker/one/dist/frontend/one
          chmod +x "packaging/docker/one/dist/tokenring-one-linux-${{ matrix.docker_arch }}"

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for TokenRing One
        id: meta-one
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/tokenring-ai/one
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./packaging/docker/one
          file: ./packaging/docker/one/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta-one.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/tokenring-ai/one,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=one-${{ matrix.docker_arch }}
          cache-to: type=gha,mode=max,scope=one-${{ matrix.docker_arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-docker-manifest:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for TokenRing One
        id: meta-one
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/tokenring-ai/one
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/tokenring-ai/one@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/tokenring-ai/one:${{ steps.meta-one.outputs.version }}"
